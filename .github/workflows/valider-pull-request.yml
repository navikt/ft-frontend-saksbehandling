name: Valider pull request
on: [pull_request]
jobs:
  valid-pull-request:
    name: Valider pull request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: navikt/fp-gha-workflows/.github/actions/setup-yarnrc@main
        with:
          npmAuthToken: ${{ secrets.READER_TOKEN }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 26.1.0
          cache: 'yarn'

      - name: Installere dependencies
        run: yarn install --immutable

      - name: Bygg
        run: yarn build

      - name: Stylelint
        run: yarn stylelint

      - name: ESLint
        run: yarn eslint

      - name: Typescript
        run: yarn tsc

      - name: Run test
        run: yarn test

      - name: Bygg storybook
        if: contains(github.event.pull_request.title, 'storybook')
        run: yarn build:storybook

  sif-code-scan:
    runs-on: ubuntu-latest
    name: "SIF Code Scan"
    steps:
      - uses: actions/checkout@v7
      - uses: navikt/sif-gha-workflows/.github/actions/sif-code-scan@v1


  knip-it:
    name: Kjør knip
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Run knip
        uses: navikt/fp-gha-workflows/.github/actions/knip-it@main
        with:
          npm-auth-token: ${{ secrets.READER_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          package-manager: 'yarn'
          node-version: 26.1.0
